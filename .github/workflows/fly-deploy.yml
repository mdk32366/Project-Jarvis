name: CI / Deploy
on:
  push:
    branches: [main]
    paths-ignore:           # docs-only pushes to main skip CI+deploy (no app change)
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]        # run tests on PRs into main (never deploys)
  workflow_dispatch:        # manual re-run of the suite from the Actions UI

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  migrations:
    name: Migration bootstrap (fresh Postgres)
    # The pytest suite builds its schema with create_all() on SQLite and never
    # runs the migration chain against Postgres. This job does the one thing it
    # can't: prove `alembic upgrade head` bootstraps a complete schema on an
    # EMPTY Postgres (audit H2). The service DB starts empty and the app never
    # boots here, so create_all() can't mask a broken migration.
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migration_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: alembic upgrade head on an empty DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/migration_test
        run: python -m alembic upgrade head

  deploy:
    name: Deploy app
    needs: [test, migrations]   # deploy ONLY if tests AND a fresh-DB migration pass
    # deploy exclusively on a real push to main — PRs and manual dispatch run tests only
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
