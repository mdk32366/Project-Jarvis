name: CI / Deploy
on:
  push:
    branches: [main]
    paths-ignore:           # docs-only pushes to main skip CI+deploy (no app change)
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]        # run tests on PRs into main (never deploys)
  workflow_dispatch:        # manual re-run of the suite from the Actions UI

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  deploy:
    name: Deploy app
    needs: test              # deploy ONLY if tests pass
    # deploy exclusively on a real push to main — PRs and manual dispatch run tests only
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
