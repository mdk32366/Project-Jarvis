app = "jarvis-mdk"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  IMAP_HOST = "imap.gmail.com"
  IMAP_PORT = "993"
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "587"
  INGEST_POLL_SECONDS = "120"

[deploy]
  release_command = "alembic upgrade head"

[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  ingest = "python -m app.channels.email_pipeline --watch"
  worker = "python -m app.workers.job_worker --watch"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "40s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["api", "ingest", "worker"]